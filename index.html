<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <p>Use <strong>Mouse</strong> or <strong>↑ ↓ Arrow Keys</strong> to control the left paddle</p>
            <p>Computer controls the right paddle</p>
            <p>First to 11 points wins!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
